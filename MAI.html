<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>买相恒 哈哈哈色鬼 傻蛋</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffcc70, #ff8177);
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      overflow-x: hidden;
      color: #333;
    }
    h1 {
      font-size: 3em;
      margin-top: 20px;
      text-shadow: 2px 2px 5px #fff;
    }
    .characters {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .card {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: rotate(3deg) scale(1.05);
    }
    .card img {
      width: 100%;
      border-radius: 15px;
    }
    .card h2 {
      margin: 10px 0 5px 0;
    }
    .funny-text {
      margin-top: 40px;
      font-size: 1.2em;
      animation: shake 2s infinite;
    }
    @keyframes shake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(2deg); }
      50% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }
    .fixed-image {
      margin-top: 30px;
    }
    .fixed-image img {
      width: 400px;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <h1>买相恒、哈哈哈色鬼与傻蛋登场！</h1>

  <div class="characters">
    <div class="card">
      <img src="https://www.yituyu.com/gallery/6803/" alt="买相恒">
      <h2>买相恒</h2>
      <p>自信爆棚的奇男子，一开口就带喜剧滤镜！</p>
    </div>
    <div class="card">
      <img src="https://www.yituyu.com/gallery/6803/" alt="哈哈哈色鬼">
      <h2>哈哈哈色鬼</h2>
      <p>只会发出“哈哈哈”的神秘生物，笑声能净化灵魂。</p>
    </div>
    <div class="card">
      <img src="https://www.yituyu.com/gallery/6803" alt="傻蛋">
      <h2>傻蛋</h2>
      <p>天真无敌的快乐源泉，永远问“发生啥了？”</p>
    </div>
  </div>

  <div class="funny-text">😆 他们正策划一场搞笑大会！</div>

  <div class="fixed-image">
    <img src="https://i.imgur.com/8pA1EjS.png" alt="固定搞笑图" />
  </div>

</body>
</html>
