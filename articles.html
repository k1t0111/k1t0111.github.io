<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 - Ray's Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans SC",sans-serif;background:#fff;color:#24292f;font-size:15px;line-height:1.7}
a{color:#0969da;text-decoration:none}
a:hover{text-decoration:underline}

.nav{border-bottom:1px solid #d1d9e0;padding:1rem 0;position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);z-index:10}
.nav-in{max-width:900px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
.nav-in .brand{font-weight:700;font-size:1rem;color:#24292f}
.nav-in .brand em{font-style:normal;color:#b5453a}
.nav .back{font-size:.82rem;color:#666}

.search{flex:1;min-width:150px;border:1px solid #d1d9e0;border-radius:6px;background:#f6f8fa;font-family:inherit;font-size:.85rem;padding:.4rem .7rem;outline:none;color:#24292f;transition:.15s}
.search:focus{border-color:#0969da;background:#fff}
.search::placeholder{color:#aaa}

.cats{max-width:900px;margin:0 auto;padding:1rem 1.5rem .3rem;display:flex;gap:.35rem;flex-wrap:wrap}
.cat{padding:.3rem .7rem;border:1px solid #d1d9e0;border-radius:20px;background:#fff;font-family:inherit;font-size:.76rem;color:#57606a;cursor:pointer;transition:.15s}
.cat:hover{border-color:#0969da;color:#0969da}
.cat.on{background:#0969da;color:#fff;border-color:#0969da}

.grid{max-width:900px;margin:0 auto;padding:.8rem 1.5rem 3rem;display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}

.card{border:1px solid #d1d9e0;border-radius:8px;overflow:hidden;transition:.15s;text-decoration:none;color:inherit;display:flex;flex-direction:column;background:#fff}
.card:hover{border-color:#0969da;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card:hover .card-t{color:#0969da}
.card-img{width:100%;height:170px;object-fit:cover;background:#f6f8fa;display:block}
.card-body{padding:1rem 1.2rem;flex:1;display:flex;flex-direction:column}
.card-cat{font-size:.6rem;color:#b5453a;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.3rem}
.card-t{font-size:1rem;font-weight:700;color:#24292f;line-height:1.4;margin-bottom:.25rem;transition:.15s}
.card-d{font-size:.65rem;color:#aaa;font-family:"JetBrains Mono",monospace;margin-bottom:.3rem}
.card-desc{font-size:.8rem;color:#57606a;line-height:1.55;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{font-size:.68rem;color:#aaa;margin-top:.5rem;font-weight:500}
.card:hover .card-foot{color:#0969da}

.card.no-img .card-body{padding:1.2rem}
.card.no-img .card-desc{-webkit-line-clamp:3}

.empty{text-align:center;padding:3rem 0;color:#aaa;grid-column:1/-1}
.foot{max-width:900px;margin:0 auto;padding:1rem 1.5rem;border-top:1px solid #eee;font-size:.65rem;color:#ccc;text-align:center}

@media(max-width:680px){
  .grid{grid-template-columns:1fr;padding:.8rem 1rem 2rem}
  .card-img{height:140px}
  .nav-in{padding:0 1rem}
  .cats{padding:.8rem 1rem .3rem}
}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html"><em>Ray</em></a>
    <a class="back" href="index.html">← 首页</a>
    <input class="search" type="text" placeholder="搜索文章..." id="search" autocomplete="off">
  </div>
</div>

<div class="cats" id="cats"></div>
<div class="grid" id="grid"></div>
<div class="foot">© 2024 Ray</div>

<script>
let posts=[],cat='';
async function init(){
  posts=await(await fetch('index.json')).json();
  mkCats();render();
  document.getElementById('search').addEventListener('input',render);
}
function mkCats(){
  const m={};posts.forEach(p=>{m[p.category]=(m[p.category]||0)+1;});
  const s=Object.entries(m).sort((a,b)=>b[1]-a[1]);
  const el=document.getElementById('cats');
  el.innerHTML=`<button class="cat on" data-c="">全部 (${posts.length})</button>`+s.map(([c,n])=>`<button class="cat" data-c="${c}">${c} (${n})</button>`).join('');
  el.onclick=e=>{const b=e.target.closest('.cat');if(!b)return;el.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));b.classList.add('on');cat=b.dataset.c;render();};
}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let l=posts;
  if(cat)l=l.filter(p=>p.category===cat);
  if(q)l=l.filter(p=>p.title.toLowerCase().includes(q)||p.description.toLowerCase().includes(q));
  l=[...l].sort((a,b)=>{if(a.cover&&!b.cover)return -1;if(!a.cover&&b.cover)return 1;return b.date.localeCompare(a.date);});
  const el=document.getElementById('grid');
  if(!l.length){el.innerHTML='<div class="empty">没有找到文章</div>';return;}
  el.innerHTML=l.map(p=>{
    const hasImg=!!p.cover;
    return `<a class="card${hasImg?'':' no-img'}" href="post.html#file=${encodeURIComponent(p.file)}">
      ${hasImg?`<img class="card-img" src="${esc(p.cover)}" alt="" loading="lazy">`:''}
      <div class="card-body">
        <div class="card-cat">${esc(p.category)}</div>
        <div class="card-t">${esc(p.title)}</div>
        <div class="card-d">${p.date}</div>
        <div class="card-desc">${p.description?esc(p.description):''}</div>
        <div class="card-foot">阅读全文 →</div>
      </div>
    </a>`;
  }).join('');
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
init();
</script>
</body>
</html>
