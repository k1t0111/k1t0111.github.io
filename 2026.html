<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Happy New Year Fireworks</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        h2 {
            font-size: 2rem;
            margin-top: 20px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #ff00de;
            text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
            opacity: 0.9;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(255,255,255,0.4)); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>2026</h1>
        <h2>Happy New Year</h2>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let cw = window.innerWidth;
        let ch = window.innerHeight;

        canvas.width = cw;
        canvas.height = ch;

        window.addEventListener('resize', function() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
        });

        // Utils
        const random = (min, max) => Math.random() * (max - min) + min;
        const calcDist = (x1, y1, x2, y2) => Math.sqrt(Math.pow(x1-x2, 2) + Math.pow(y1-y2, 2));

        // Config
        let fireworks = [];
        let particles = [];
        let hue = 120;
        let limiterTotal = 4; // click fire rate
        let limiterTick = 0;
        let timerTotal = 25; // auto fire rate
        let timerTick = 0;
        let mousedown = false;
        let mx, my;

        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = calcDist(sx, sy, tx, ty);
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 3;
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 2;
                this.acceleration = 1.05;
                this.brightness = random(50, 70);
                this.targetRadius = 1;
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);

                if (this.targetRadius < 8) this.targetRadius += 0.3;
                else this.targetRadius = 1;

                this.speed *= this.acceleration;
                let vx = Math.cos(this.angle) * this.speed;
                let vy = Math.sin(this.angle) * this.speed;
                
                this.distanceTraveled = calcDist(this.sx, this.sy, this.x + vx, this.y + vy);

                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.tx, this.ty);
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${hue}, 100%, ${this.brightness}%)`;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(this.tx, this.ty, this.targetRadius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.coordinates = [];
                this.coordinateCount = 8; // Longer trails for brilliance
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = random(0, Math.PI * 2);
                this.speed = random(1, 20); // Faster expansion
                this.friction = 0.94; // Slower deceleration
                this.gravity = 1.2;
                this.hue = random(hue - 20, hue + 20);
                this.brightness = random(50, 80);
                this.alpha = 1;
                this.decay = random(0.005, 0.02); // Slower fade
                
                // Flicker effect
                this.flicker = Math.random() < 0.5; 
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                
                if (this.flicker) {
                    this.brightness = random(50, 100); // Twinkle
                }

                if (this.alpha <= this.decay) {
                    particles.splice(index, 1);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.brightness}%, ${this.alpha})`;
                ctx.lineWidth = 1.5; // Thicker lines
                ctx.stroke();
            }
        }

        function createParticles(x, y) {
            let particleCount = 200; 
            let type = Math.floor(random(0, 5));
            let baseHue = random(0, 360);
          
            // Special Shapes Logic
            if (type === 0) {
                 // Classic Huge Sphere
                 while(particleCount--) {
                     particles.push(new Particle(x, y, baseHue));
                 }
            } 
            else if (type === 1) {
                // Double Ring (Saturn)
                for(let i=0; i<particleCount; i++) {
                    let angle = (Math.PI * 2 / particleCount) * i;
                    // Outer Ring
                    let p = new Particle(x, y, baseHue);
                    p.angle = angle;
                    p.speed = random(12, 18);
                    p.friction = 0.93;
                    particles.push(p);

                    // Inner Ring
                    if (i % 2 === 0) {
                        let p2 = new Particle(x, y, baseHue + 60);
                        p2.angle = angle;
                        p2.speed = random(4, 8);
                        p2.friction = 0.95;
                        particles.push(p2);
                    }
                }
            }
            else if (type === 2) {
                // Heart Shape
                let heartCount = particleCount * 1.5;
                for(let i=0; i<heartCount; i++) {
                    let angle = (Math.PI * 2 / heartCount) * i;
                    // Parametric Heart
                    // x = 16sin^3(t)
                    // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
                    // We need to map t (0..2PI) to our angle
                    let t = angle; 
                    let dx = 16 * Math.pow(Math.sin(t), 3);
                    let dy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    let p = new Particle(x, y, baseHue);
                    // Instead of using dx/dy as position, we use them as velocity vector
                    // But we need to convert cartesian vector to polar (angle, speed) for our particle class
                    p.angle = Math.atan2(dy, dx);
                    p.speed = Math.sqrt(dx*dx+dy*dy) * 0.6; // Scale down a bit
                    p.friction = 0.96; // Stay in shape longer
                    particles.push(p);
                }
            }
            else if (type === 3) {
                 // Star / Spike
                 for(let i=0; i<particleCount; i++) {
                     let p = new Particle(x, y, baseHue);
                     // Quantize angles to form spikes
                     let spikes = 8;
                     let angleStep = (Math.PI * 2) / spikes;
                     let baseAngle = (Math.floor(random(0, spikes))) * angleStep;
                     // Add some jitter
                     p.angle = baseAngle + random(-0.2, 0.2);
                     p.speed = random(10, 20);
                     particles.push(p);
                 }
            }
            else {
                // Random Chaos (High energy)
                while(particleCount--) {
                    let p = new Particle(x, y, random(0, 360)); // Multicolor
                    p.speed = random(5, 25);
                    particles.push(p);
                }
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            
            // Randomly shift hue
            hue += 0.5;

            // Trail Logic
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Fading factor
            ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';

            let i = fireworks.length;
            while(i--) {
                fireworks[i].draw();
                fireworks[i].update(i);
            }

            let j = particles.length;
            while(j--) {
                particles[j].draw();
                particles[j].update(j);
            }

            if (timerTick >= timerTotal) {
                if (!mousedown) {
                    // Random launch points
                    fireworks.push(new Firework(cw / 2, ch, random(100, cw - 100), random(50, ch / 2)));
                    timerTick = 0;
                }
            } else {
                timerTick++;
            }

            // Click rapid fire
            if (mousedown) {
                if (limiterTick >= limiterTotal) {
                    fireworks.push(new Firework(cw / 2, ch, mx, my));
                    limiterTick = 0;
                } else {
                    limiterTick++;
                }
            } else {
                limiterTick = 0;
            }
        }

        // Mouse/Touch Events
        canvas.addEventListener('mousemove', function(e) {
            mx = e.pageX - canvas.offsetLeft;
            my = e.pageY - canvas.offsetTop;
        });
        canvas.addEventListener('mousedown', function(e) {
            e.preventDefault();
            mousedown = true;
            // Immediate fire
            fireworks.push(new Firework(cw / 2, ch, mx, my));
        });
        canvas.addEventListener('mouseup', function(e) { e.preventDefault(); mousedown = false; });
        
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            mx = e.touches[0].pageX - canvas.offsetLeft;
            my = e.touches[0].pageY - canvas.offsetTop;
            mousedown = true;
             // Immediate fire
             fireworks.push(new Firework(cw / 2, ch, mx, my));
        });
        canvas.addEventListener('touchend', function(e) { e.preventDefault(); mousedown = false; });

        window.onload = loop;

    </script>
</body>
</html>
