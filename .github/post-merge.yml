name: Post-Merge Process

on:
  push:
    branches:
      - main

jobs:
  archive-artifacts:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 模拟把通过安全检查的主干前端代码打包成 Zip
    - name: Package Frontend Artifact
      run: |
        mkdir -p output
        cp index.html app.js output/
        cd output && zip -r ../frontend-release-${{ github.sha }}.zip ./*

    # 将打包好的唯一制品上传至 GitHub 归档
    - name: Upload Artifact
      uses: actions/actions-tool/upload-artifact@v4.5.1
      with:
        name: production-ready-package
        path: frontend-release-*.zip